name: test and build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    env:
      NAPI_V8_BUILD_METHOD: prebuilt
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Ensure submodules are initialized
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --depth=1
          test -f node/src/node_api_types.h

      - name: Validate public N-API headers stay V8-agnostic
        run: |
          ! grep -nE "v8::|<v8.h>|\"v8.h\"" napi/include/js_native_api.h napi/include/node_api.h

      - name: Build napi-v8
        run: cmake -S napi/v8 -B napi/v8/build -DNAPI_V8_BUILD_TESTS=ON

      - name: Compile napi-v8
        run: cmake --build napi/v8/build -j4

      - name: Test napi-v8
        run: ctest --test-dir napi/v8/build --output-on-failure -R '^napi_v8\.'

      - name: Build ubi (Debug)
        run: |
          cmake -S ubi -B build-ubi -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-ubi -j4
      - name: Test ubi
        run: ctest --test-dir build-ubi --output-on-failure -j4
      - name: Remove debug build
        run: rm -rf build-ubi

      - name: Build ubi
        run: |
          cmake -S ubi -B build-ubi -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ubi -j4

      - name: Test ubi
        run: ctest --test-dir build-ubi --output-on-failure -j4

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-ubi/ubi dist/bin/ubi
          cp README.md dist/README.md
          (cd dist && zip -r ../ubi-linux.zip bin README.md)

      - name: Upload artifact ubi
        uses: actions/upload-artifact@v4
        with:
          name: ubi-linux
          path: ubi-linux.zip
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  build-macos:
    name: build-macos
    runs-on: macos-latest
    env:
      NAPI_V8_BUILD_METHOD: prebuilt
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Ensure submodules are initialized
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --depth=1
          test -f node/src/node_api_types.h

      - name: Validate public N-API headers stay V8-agnostic
        run: |
          ! grep -nE "v8::|<v8.h>|\"v8.h\"" napi/include/js_native_api.h napi/include/node_api.h

      - name: Build napi-v8
        run: cmake -S napi/v8 -B napi/v8/build -DNAPI_V8_BUILD_TESTS=ON

      - name: Compile napi-v8
        run: cmake --build napi/v8/build -j4

      - name: Test napi-v8
        run: ctest --test-dir napi/v8/build --output-on-failure -R '^napi_v8\.'

      - name: Build ubi
        run: |
          cmake -S ubi -B build-ubi -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ubi -j4

      - name: Test ubi
        run: ctest --test-dir build-ubi --output-on-failure -j4

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-ubi/ubi dist/bin/ubi
          cp README.md dist/README.md
          (cd dist && zip -r ../ubi-macos.zip bin README.md)

      - name: Upload artifact ubi
        uses: actions/upload-artifact@v4
        with:
          name: ubi-macos
          path: ubi-macos.zip
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  build-wasix-linux:
    name: build-wasix-linux
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasixcc
        uses: wasix-org/wasixcc@v0.4.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sysroot-tag: v2026-02-16.1
          version: v0.4.1

      - name: Install wasm-tools
        run: |
          cargo install --locked wasm-tools

      - name: Build ubi (WASIX)
        shell: bash
        run: |
          set -euo pipefail
          ./ubi/scripts/build-wasix.sh

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-wasix/ubi dist/bin/ubi
          cp README.md dist/README.md
          (cd dist && zip -r ../ubi-wasix.zip bin README.md)

      - name: Upload artifact ubi
        uses: actions/upload-artifact@v4
        with:
          name: ubi-wasix
          path: ubi-wasix.zip
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
