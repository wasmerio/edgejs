  build-wasix-linux:
    name: build-wasix-linux
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasixcc
        uses: wasix-org/wasixcc@v0.4.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sysroot-tag: v2026-02-16.1
          version: v0.4.2

      - name: Install wasm-tools
        run: |
          cargo install --locked wasm-tools

      - name: Build edge (WASIX)
        shell: bash
        run: |
          set -euo pipefail
          ./wasix/build-wasix.sh

      - name: Install Wasmer CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://get.wasmer.io | sh -s "v7.1.0-rc.2"
          echo "${HOME}/.wasmer/bin" >> "${GITHUB_PATH}"
          "${HOME}/.wasmer/bin/wasmer" --version

      - name: Install top-n test dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd tests/top-n-test
          npm ci --legacy-peer-deps

      - name: Run top-n tests (wasix_edgejs)
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          wasmer package build .
          webc_path="$(find "${GITHUB_WORKSPACE}" -maxdepth 2 -type f -name '*.webc' | head -n 1)"
          if [[ -z "${webc_path}" ]]; then
            echo "Failed to locate generated .webc package after 'wasmer package build .'." >&2
            exit 1
          fi
          cd tests/top-n-test
          WASMER_BIN=wasmer EDGEJS_PACKAGE="${webc_path}" node runner.js -r wasix_edgejs --all --skip which, cross-spawn, playwright-core

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          make dist-only BUILD_DIR=build-wasix JOBS=4 ZIP_NAME=edge-wasix.zip

      - name: Upload artifact edge
        uses: actions/upload-artifact@v4
        with:
          name: edge-wasix
          path: edge-wasix.zip
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
