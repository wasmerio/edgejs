name: test and build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    env:
      NAPI_V8_BUILD_METHOD: prebuilt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure submodules are initialized
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --depth=1
          test -f node/src/node_api_types.h

      - name: Validate public N-API headers stay V8-agnostic
        run: |
          ! grep -nE "v8::|<v8.h>|\"v8.h\"" napi/include/js_native_api.h napi/include/node_api.h

      - name: Build napi-v8
        run: cmake -S napi/v8 -B napi/v8/build

      - name: Compile napi-v8
        run: cmake --build napi/v8/build -j4

      - name: Test napi-v8
        run: ctest --test-dir napi/v8/build --output-on-failure -R napi_v8_tier1_tests

      - name: Build unode
        run: |
          cmake -S unode -B build-unode -DCMAKE_BUILD_TYPE=Release
          cmake --build build-unode -j4

      - name: Test unode
        run: ctest --test-dir build-unode --output-on-failure

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-unode/unode dist/bin/unode
          cp README.md dist/README.md
          (cd dist && zip -r ../unode-linux.zip bin README.md)

      - name: Upload artifact unode
        uses: actions/upload-artifact@v4
        with:
          name: unode-linux
          path: unode-linux.zip
          if-no-files-found: error

  build-macos:
    name: build-macos
    runs-on: macos-latest
    env:
      NAPI_V8_BUILD_METHOD: prebuilt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure submodules are initialized
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --depth=1
          test -f node/src/node_api_types.h

      - name: Validate public N-API headers stay V8-agnostic
        run: |
          ! grep -nE "v8::|<v8.h>|\"v8.h\"" napi/include/js_native_api.h napi/include/node_api.h

      - name: Build napi-v8
        run: cmake -S napi/v8 -B napi/v8/build

      - name: Compile napi-v8
        run: cmake --build napi/v8/build -j4

      - name: Test napi-v8
        run: ctest --test-dir napi/v8/build --output-on-failure -R napi_v8_tier1_tests

      - name: Build unode
        run: |
          cmake -S unode -B build-unode -DCMAKE_BUILD_TYPE=Release
          cmake --build build-unode -j4

      - name: Test unode
        run: ctest --test-dir build-unode --output-on-failure

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-unode/unode dist/bin/unode
          cp README.md dist/README.md
          (cd dist && zip -r ../unode-macos.zip bin README.md)

      - name: Upload artifact unode
        uses: actions/upload-artifact@v4
