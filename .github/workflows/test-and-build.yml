  build-wasix-linux:
    name: build-wasix-linux
    runs-on: ubuntu-latest
    env:
      LLVM_DIR: llvm
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasixcc
        uses: wasix-org/wasixcc@v0.4.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sysroot-tag: v2026-02-16.1
          version: v0.4.2

      - name: Install wasm-tools
        run: |
          cargo install --locked wasm-tools

      - name: Build edge (WASIX)
        shell: bash
        run: |
          set -euo pipefail
          make build-wasix

      - name: Install LLVM
        shell: bash
        run: |
          set -euo pipefail
          curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --retry 3 --proto '=https' --tlsv1.2 -sSf \
            "https://github.com/wasmerio/llvm-custom-builds/releases/download/21.x/llvm-linux-amd64.tar.xz" \
            -L -o llvm.tar.xz
          LLVM_DIR="$(pwd)/${LLVM_DIR}"
          mkdir -p "${LLVM_DIR}"
          tar xf llvm.tar.xz --strip-components=1 -C "${LLVM_DIR}"
          echo "${LLVM_DIR}/bin" >> "$GITHUB_PATH"
          echo "${LLVM_DIR}/usr/bin" >> "$GITHUB_PATH"
          echo "LLVM_SYS_211_PREFIX=${LLVM_DIR}" >> "$GITHUB_ENV"
          echo "ENABLE_LLVM=1" >> "$GITHUB_ENV"

      - name: Setup Prebuilt V8
        shell: bash
        run: |
          set -euo pipefail
          V8_VERSION="11.9.2"
          ASSET="v8-linux-amd64.tar.xz"
          V8_ROOT="$PWD/.ci/v8/${V8_VERSION}/linux-amd64"
          mkdir -p "$V8_ROOT"
          curl -fsSL "https://github.com/wasmerio/v8-custom-builds/releases/download/${V8_VERSION}/${ASSET}" -o "$V8_ROOT/${ASSET}"
          tar -xJf "$V8_ROOT/${ASSET}" -C "$V8_ROOT"

          echo "V8_INCLUDE_DIR=$V8_ROOT/include" >> "$GITHUB_ENV"
          echo "V8_LIB_DIR=$V8_ROOT/lib" >> "$GITHUB_ENV"
          echo "V8_DEFINES=V8_COMPRESS_POINTERS" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$V8_ROOT/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Build napi_wasmer CLI
        shell: bash
        run: |
          set -euo pipefail
          make build-napi-wasmer-cli

      - name: Smoke test edgejs.wasm via napi_wasmer
        shell: bash
        run: |
          set -euo pipefail
          make test-wasix-napi-cli

      - name: Install Wasmer CLI
        uses: wasmerio/setup-wasmer@v3

      - name: Smoke test WASIX safe mode via Wasmer CLI
        shell: bash
        run: |
          set -euo pipefail
          make test-wasix-safe-mode WASMER_BIN=wasmer

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          make dist-only BUILD_DIR=build-wasix JOBS=4 ZIP_NAME=edge-wasix.zip

      - name: Smoke test packaged WASIX dist via Wasmer CLI
        shell: bash
        run: |
          set -euo pipefail
          make test-wasix-safe-mode WASMER_BIN=wasmer WASIX_PACKAGE_DIR="$(pwd)/dist"

      - name: Upload artifact edge
        uses: actions/upload-artifact@v4
        with:
          name: edge-wasix
          path: edge-wasix.zip
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
